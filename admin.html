<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Dunyo Quiz</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --purple:#6C63FF;--purple-dark:#5046E4;--purple-light:#EEF0FF;
      --green:#16A34A;--green-light:#DCFCE7;
      --red:#DC2626;--red-light:#FEE2E2;
      --yellow:#D97706;--yellow-light:#FEF3C7;
      --gray:#6B7280;--gray-light:#F3F4F6;
      --bg:#F8F9FF;--card:#fff;--border:#E5E7EB;
      --text:#111827;--text2:#6B7280;
      --radius:10px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .login-wrap{max-width:400px;margin:80px auto;padding:0 16px}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center}
    .login-card h1{font-size:22px;font-weight:700;margin-bottom:6px;color:var(--purple)}
    .login-card p{font-size:14px;color:var(--text2);margin-bottom:24px}
    .inp{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;margin-bottom:10px;background:var(--card);color:var(--text)}
    .inp:focus{border-color:var(--purple)}
    select.inp{cursor:pointer}
    textarea.inp{resize:vertical;min-height:80px;margin-bottom:0}
    .err{font-size:13px;color:var(--red);margin-top:8px;display:none}
    .admin-wrap{display:none;flex-direction:column;min-height:100vh}
    .admin-wrap.show{display:flex}
    .topbar{background:var(--purple);color:white;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .topbar-title{font-size:16px;font-weight:700}
    .topbar-right{display:flex;align-items:center;gap:12px;font-size:13px}
    .btn-logout{background:rgba(255,255,255,.2);color:white;border:none;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer}
    .tabs{display:flex;gap:4px;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:49px;z-index:9}
    .tab{padding:7px 16px;border:1px solid var(--border);border-radius:6px;background:none;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
    .tab.active{background:var(--purple);color:white;border-color:var(--purple);font-weight:600}
    .content{flex:1;padding:20px;max-width:1200px;margin:0 auto;width:100%}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
    .card-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
    .stat-n{font-size:26px;font-weight:700;color:var(--purple)}
    .stat-l{font-size:12px;color:var(--text2);margin-top:3px}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}}
    .btn-pri{padding:9px 20px;background:var(--purple);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
    .btn-pri:hover{background:var(--purple-dark)}
    .btn-pri:disabled{opacity:.5;cursor:not-allowed}
    .btn-sec{padding:9px 16px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer}
    .btn-sm{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
    .btn-edit{color:var(--purple);border-color:var(--purple-light)}
    .btn-del{color:var(--red);border-color:#FECACA}
    .btn-pub{color:var(--green);border-color:#BBF7D0}
    .btn-arch{color:var(--gray);border-color:var(--border)}
    .table-wrap{overflow-x:auto;margin-top:8px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:500;white-space:nowrap}
    td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#FAFAFA}
    .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
    .badge-published{background:var(--green-light);color:var(--green)}
    .badge-draft{background:var(--yellow-light);color:var(--yellow)}
    .badge-archived{background:var(--gray-light);color:var(--gray)}
    .badge-easy{background:#DCFCE7;color:#15803D}
    .badge-medium{background:#FEF3C7;color:#92400E}
    .badge-hard{background:#FEE2E2;color:#991B1B}
    .msg{font-size:13px;padding:8px 12px;border-radius:6px;margin-top:8px;display:none}
    .msg-ok{background:var(--green-light);color:var(--green)}
    .msg-err{background:var(--red-light);color:var(--red)}
    .loading{text-align:center;padding:24px;color:var(--text2);font-size:13px}
    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:16px;flex-wrap:wrap}
    .breadcrumb a{color:var(--purple);cursor:pointer;text-decoration:none}
    .breadcrumb a:hover{text-decoration:underline}
    .breadcrumb span{color:var(--text2)}
    .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
    .filter-row select,.filter-row input{padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card);color:var(--text);outline:none}
    .filter-row input{flex:1;min-width:140px}
    .q-count{font-size:13px;color:var(--text2);margin-left:auto}
    .q-text-cell{max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions-col{white-space:nowrap;display:flex;gap:4px}
    .empty{text-align:center;padding:32px;color:var(--text2)}
    .color-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
    .emoji-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .ep-btn{width:40px;height:40px;border-radius:8px;border:2px solid var(--border);background:var(--bg);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .ep-btn:hover{border-color:var(--purple);background:var(--purple-light);transform:scale(1.1)}
    .ep-btn.active{border-color:var(--purple);background:var(--purple-light)}
    .emoji-preview{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,var(--purple-light),#F0EDFF);border:2px solid var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
    .color-pick-btn{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s}
    .color-pick-btn.active{border-color:var(--text);transform:scale(1.15)}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap" class="login-wrap">
  <div class="login-card">
    <h1>🌍 Dunyo Quiz</h1>
    <p>Admin Panel</p>
    <input class="inp" id="email-inp" type="email" placeholder="Email"/>
    <input class="inp" id="pass-inp" type="password" placeholder="Parol"/>
    <div class="err" id="login-err"></div>
    <button class="btn-pri" id="login-btn" onclick="adminLogin()" style="width:100%;margin-top:4px">Kirish</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="admin-wrap">
  <div class="topbar">
    <div class="topbar-title">🌍 Dunyo Quiz Admin</div>
    <div class="topbar-right">
      <span id="admin-email"></span>
      <button class="btn-logout" onclick="adminLogout()">Chiqish</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="goTab('dashboard')" id="tab-dashboard">📊 Dashboard</button>
    <button class="tab" onclick="goTab('categories')" id="tab-categories">📂 Kategoriyalar</button>
    <button class="tab" onclick="goTab('topics')" id="tab-topics">📚 Mavzular</button>
    <button class="tab" onclick="goTab('questions')" id="tab-questions">📝 Savollar</button>
    <button class="tab" onclick="goTab('users')" id="tab-users">👥 Foydalanuvchilar</button>
  </div>
  <div class="content">
    <div id="content-dashboard"></div>
    <div id="content-categories" style="display:none"></div>
    <div id="content-topics" style="display:none"></div>
    <div id="content-questions" style="display:none"></div>
    <div id="content-users" style="display:none"></div>
  </div>
</div>

<script>
const ADMIN_UID = 'HUToMkDnMFRcuJWhXL6MRfm00bl2';

const PRESET_EMOJIS = ["🌍","🗺️","📜","🐯","🧠","🇬🇧","⚖️","📚","🏛️","🏆","🎨","🔬","💻","🧮","🕌","🌱","🎓","🏥","✈️","🍎","🎵","⚽","🌊","🦁","🔥","💡","🚀","🌙","⭐","🎯"];

const SLUG_EMOJI_DEFAULTS = {
  "bayroqlar":"🌍", "geografiya":"🗺️", "tarix":"📜", "hayvonlar":"🐯",
  "mantiq":"🧠", "ingliz":"🇬🇧", "huquq":"⚖️", "sport":"🏆", "san_at":"🎨",
  "fan":"🔬", "texnologiya":"💻", "matematika":"🧮", "madaniyat":"🕌", "tabiat":"🌱"
};

function isValidEmoji(str) {
  if (!str || !str.trim()) return false;
  // Faqat harflar, raqamlar, nuqtalar, qavs kabi oddiy belgilarni rad etish
  const invalidPattern = /^[a-zA-Z0-9 ().,!?_-]+$/;
  if (invalidPattern.test(str.trim())) return false;
  return true;
}

function getSafeEmoji(emoji, slug) {
  if (isValidEmoji(emoji)) return emoji;
  if (slug && SLUG_EMOJI_DEFAULTS[slug]) return SLUG_EMOJI_DEFAULTS[slug];
  return '📚';
}

function initCategoryForm() {
  // Emoji picker
  const picker = document.getElementById('c-emoji-picker');
  if (picker) {
    picker.innerHTML = PRESET_EMOJIS.map(e =>
      '<button type="button" class="ep-btn" data-emoji="' + e + '" onclick="selectEmoji(this.dataset.emoji)">' + e + '</button>'
    ).join('');
  }
  // Color picker
  const colorPicker = document.getElementById('c-color-picker');
  if (colorPicker) {
    colorPicker.innerHTML = Object.entries(COLOR_MAP).map(([k,v]) => {
      const isActive = k === 'purple' ? 'active' : '';
      return '<button type="button" class="color-pick-btn ' + isActive + '" style="background:' + v + '" title="' + k + '" onclick="selectColor(\'' + k + '\',this)"></button>';
    }).join('');
  }
  // Auto order
  autoFillOrder();
}

async function autoFillOrder() {
  try {
    const snap = await db.collection('categories').get();
    const maxOrder = snap.docs.reduce((max, d) => Math.max(max, d.data().order || 0), 0);
    const orderInp = document.getElementById('c-order');
    if (orderInp && !orderInp.value) orderInp.value = maxOrder + 1;
  } catch(e) {}
}

function selectColor(colorKey, btn) {
  document.getElementById('c-color').value = colorKey;
  document.querySelectorAll('.color-pick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function initEmojiPicker() { initCategoryForm(); }

function onCatTitleInput() {
  const title = document.getElementById('c-title').value.trim();
  const slug = slugify(title);
  const preview = document.getElementById('c-slug-preview');
  if (preview) preview.textContent = slug || "-";
  // Slug bo'yicha emoji taklif
  if (SLUG_EMOJI_DEFAULTS[slug]) {
    const current = document.getElementById('c-emoji').value.trim();
    if (!isValidEmoji(current)) selectEmoji(SLUG_EMOJI_DEFAULTS[slug]);
  }
}

function selectEmoji(emoji) {
  document.getElementById('c-emoji').value = emoji;
  document.getElementById('c-emoji-preview').textContent = emoji;
  document.querySelectorAll('.ep-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === emoji);
  });
}

function updateEmojiPreview() {
  const val = document.getElementById('c-emoji').value.trim();
  const preview = document.getElementById('c-emoji-preview');
  if (preview) preview.textContent = isValidEmoji(val) ? val : "📚";
}

function autoSlugEmojiOld() {
  const title = document.getElementById('c-title').value.trim();
  const slug = slugify(title);
  if (SLUG_EMOJI_DEFAULTS[slug]) {
    const current = document.getElementById('c-emoji').value.trim();
    if (!isValidEmoji(current)) selectEmoji(SLUG_EMOJI_DEFAULTS[slug]);
  }
}
const COLOR_MAP = {
  purple:'#6C63FF', blue:'#3B82F6', green:'#16A34A',
  red:'#EF4444', orange:'#F97316', yellow:'#EAB308',
  pink:'#EC4899', teal:'#14B8A6', gray:'#6B7280'
};

firebase.initializeApp({
  apiKey:"AIzaSyC_ZP_n5H97f9yaPPmjqwrmDaPux8GvBX4",
  authDomain:"yoshhuquqshunos.firebaseapp.com",
  projectId:"yoshhuquqshunos",
  storageBucket:"yoshhuquqshunos.firebasestorage.app",
  messagingSenderId:"145645920762",
  appId:"1:145645920762:web:498ebdef77cd229013c443"
});
const auth = firebase.auth();
const db = firebase.firestore();
const TS = () => firebase.firestore.FieldValue.serverTimestamp();

let currentAdmin = null;
let allCategories = []; // cache

// ===================== AUTH =====================
auth.onAuthStateChanged(async user => {
  if (user && user.uid === ADMIN_UID) {
    currentAdmin = user;
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').classList.add('show');
    document.getElementById('admin-email').textContent = user.email || '';
    await loadCategoriesCache();
    goTab('dashboard');
  } else if (user) {
    auth.signOut();
    showLoginErr("Ruxsat yo'q.");
  } else {
    currentAdmin = null;
    document.getElementById('login-wrap').style.display = 'block';
    document.getElementById('admin-wrap').classList.remove('show');
  }
});

function adminLogin() {
  const email = document.getElementById('email-inp').value.trim();
  const pass = document.getElementById('pass-inp').value;
  if (!email || !pass) { showLoginErr("Email va parolni kiriting"); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Kirilmoqda...';
  hideLoginErr();
  auth.signInWithEmailAndPassword(email, pass).catch(e => {
    showLoginErr("Xatolik: " + (e.code.includes('wrong-password') || e.code.includes('user-not-found') ? "Email yoki parol noto'g'ri" : e.message));
    btn.disabled = false; btn.textContent = 'Kirish';
  });
}
function adminLogout() { auth.signOut(); }
function showLoginErr(m) { const el=document.getElementById('login-err'); el.textContent=m; el.style.display='block'; }
function hideLoginErr() { document.getElementById('login-err').style.display='none'; }

// ===================== TABS =====================
function goTab(tab) {
  ['dashboard','categories','topics','questions','users'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('content-'+t).style.display = t===tab ? 'block' : 'none';
  });
  if (tab==='dashboard') renderDashboard();
  if (tab==='categories') renderCategories();
  if (tab==='topics') renderTopics();
  if (tab==='questions') renderQuestions();
  if (tab==='users') renderUsers();
}

// ===================== CACHE =====================
async function loadCategoriesCache() {
  const snap = await db.collection('categories').orderBy('order').get();
  allCategories = snap.docs.map(d => ({id:d.id,...d.data()}));
}

function slugify(str) {
  return str.toLowerCase()
    .replace(/['']/g,"")
    .replace(/\s+/g,"-")
    .replace(/[^a-z0-9-]/g,"")
    .replace(/-+/g,"-")
    .trim();
}

function showMsg(id, msg, ok=true) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  el.style.display = 'block';
  setTimeout(() => { el.style.display='none'; }, 3000);
}

// ===================== DASHBOARD =====================
async function renderDashboard() {
  const el = document.getElementById('content-dashboard');
  el.innerHTML = '<div class="loading">Yuklanmoqda...</div>';
  try {
    const [catSnap, topSnap, qSnap, uSnap, rSnap] = await Promise.all([
      db.collection('categories').get(),
      db.collection('topics').get(),
      db.collection('questions').get(),
      db.collection('users').get(),
      db.collection('results').get()
    ]);
    const qs = qSnap.docs.map(d=>d.data());
    const pubQ = qs.filter(q=>q.status==='published').length;
    const draftQ = qs.filter(q=>q.status==='draft').length;

    el.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-n">${catSnap.size}</div><div class="stat-l">Kategoriyalar</div></div>
        <div class="stat-card"><div class="stat-n">${topSnap.size}</div><div class="stat-l">Mavzular</div></div>
        <div class="stat-card"><div class="stat-n">${qSnap.size}</div><div class="stat-l">Jami savollar</div></div>
        <div class="stat-card"><div class="stat-n" style="color:var(--green)">${pubQ}</div><div class="stat-l">Nashr qilingan</div></div>
        <div class="stat-card"><div class="stat-n" style="color:var(--yellow)">${draftQ}</div><div class="stat-l">Qoralama</div></div>
        <div class="stat-card"><div class="stat-n" style="color:var(--purple)">${uSnap.size}</div><div class="stat-l">Foydalanuvchilar</div></div>
        <div class="stat-card"><div class="stat-n">${rSnap.size}</div><div class="stat-l">Testlar</div></div>
      </div>
      <div class="card">
        <div class="card-title">Kategoriyalar bo'yicha</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Kategoriya</th><th>Mavzular</th><th>Savollar</th><th>Nashr</th><th>Holat</th></tr></thead>
            <tbody>
              ${allCategories.map(c => {
                const catQs = qs.filter(q=>q.categoryId===c.id||q.categorySlug===c.slug);
                const catTops = topSnap.docs.filter(d=>d.data().categoryId===c.id||d.data().categorySlug===c.slug).length;
                return `<tr>
                  <td><span style="font-size:18px;margin-right:6px">${c.emoji||'📂'}</span>${c.title}</td>
                  <td>${catTops}</td>
                  <td>${catQs.length}</td>
                  <td style="color:var(--green)">${catQs.filter(q=>q.status==='published').length}</td>
                  <td><span class="badge badge-${c.status||'draft'}">${c.status==='published'?'Nashr':c.status==='archived'?'Arxiv':'Qoralama'}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e) { el.innerHTML = `<div class="loading">Xatolik: ${e.message}</div>`; }
}

// ===================== CATEGORIES =====================
function renderCategories() {
  const el = document.getElementById('content-categories');
  el.innerHTML = `
    <div class="card">
      <div class="card-title">➕ Yangi kategoriya</div>
      <div class="form-grid">
        <div class="form-group"><label>Nomi *</label><input class="inp" id="c-title" placeholder="Masalan: Tarix"/></div>
        <div class="form-group"><label>Emoji *</label><input class="inp" id="c-emoji" placeholder="📜" maxlength="4"/></div>
      </div>
      <div class="form-group"><label>Tavsif</label><input class="inp" id="c-desc" placeholder="Qisqa tavsif"/></div>
      <div class="form-grid">
        <div class="form-group"><label>Rang</label>
          <select class="inp" id="c-color">
            ${Object.keys(COLOR_MAP).map(k=>`<option value="${k}">${k}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Tartib raqami</label><input class="inp" id="c-order" type="number" placeholder="1"/></div>
      </div>
      <div class="form-group"><label>Holat</label>
        <select class="inp" id="c-status">
          <option value="draft">Qoralama</option>
          <option value="published">Nashr qilish</option>
        </select>
      </div>
      <button class="btn-pri" onclick="addCategory()">+ Qo'shish</button>
      <div class="msg" id="c-msg"></div>
    </div>
    <div class="card">
      <div class="card-title">Mavjud kategoriyalar <span class="q-count" id="cat-count"></span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Emoji</th><th>Nomi</th><th>Slug</th><th>Tartib</th><th>Rang</th><th>Holat</th><th>Amallar</th></tr></thead>
        <tbody id="cat-tbody"><tr><td colspan="7" class="loading">Yuklanmoqda...</td></tr></tbody>
      </table></div>
    </div>`;
  loadCategoryList();
}

async function loadCategoryList() {
  const tbody = document.getElementById('cat-tbody');
  try {
    const snap = await db.collection('categories').orderBy('order').get();
    allCategories = snap.docs.map(d=>({id:d.id,...d.data()}));
    document.getElementById('cat-count').textContent = allCategories.length + ' ta';
    if (!allCategories.length) { tbody.innerHTML='<tr><td colspan="7" class="empty">Kategoriya yo\'q</td></tr>'; return; }
    tbody.innerHTML = allCategories.map(c=>`<tr>
      <td style="font-size:20px">${c.emoji||'📂'}</td>

        <button class="btn-sm btn-arch" onclick="setCatStatus('${c.id}','archived')">Arxiv</button>

async function addCategory() {
  const title = document.getElementById('c-title').value.trim();
  const rawEmoji = document.getElementById('c-emoji').value.trim();
  const desc = document.getElementById('c-desc').value.trim();
  const color = document.getElementById('c-color').value || 'purple';
  const status = document.getElementById('c-status').value;
  if (!title) { showMsg('c-msg','Kategoriya nomi majburiy',false); return; }
  const slug = slugify(title);
  if (!slug) { showMsg("c-msg","Slug yaratib bolmadi — lotin harflarida yozing",false); return; }

  // Duplicate slug tekshirish
  const existing = await db.collection('categories').doc(slug).get();
  if (existing.exists) { showMsg('c-msg', '"' + slug + '" slug allaqachon mavjud!', false); return; }

  // Emoji validation
  const emoji = getSafeEmoji(rawEmoji, slug);

  // Auto order
  const orderInp = parseInt(document.getElementById('c-order').value);
  let order = orderInp || 99;
  if (!orderInp) {
    const snap = await db.collection('categories').get();
    order = snap.docs.reduce((max, d) => Math.max(max, d.data().order || 0), 0) + 1;
  }

  try {
    await db.collection('categories').doc(slug).set({
      title, slug, emoji, description:desc, color, order, status,
      createdAt:TS(), updatedAt:TS()
    });
    showMsg('c-msg','✅ Kategoriya qo\'shildi!');
    ['c-title','c-emoji','c-desc','c-order'].forEach(id=>document.getElementById(id).value='');
    const preview = document.getElementById('c-emoji-preview');
    if (preview) preview.textContent = '📚';
    document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('active'));
    await loadCategoryList();
  } catch(e) { showMsg('c-msg','❌ '+e.message,false); }
}

async function setCatStatus(id, status) {
  await db.collection('categories').doc(id).update({status, updatedAt:TS()});
  loadCategoryList();
}

function editCategoryPrompt(id) {
  const cat = allCategories.find(c=>c.id===id);
  if (!cat) return;
  const newEmoji = prompt('Emoji:', cat.emoji||'');
  if (newEmoji===null) return;
  const newTitle = prompt('Nomi:', cat.title||'');
  if (newTitle===null) return;
  const newOrder = prompt('Tartib raqami:', cat.order||1);
  if (newOrder===null) return;
  db.collection('categories').doc(id).update({
    emoji:newEmoji.trim()||cat.emoji,
    title:newTitle.trim()||cat.title,
    order:parseInt(newOrder)||cat.order,
    updatedAt:TS()
  }).then(()=>loadCategoryList());
}

async function loadTopicList() {

        <td><span style="font-size:16px">${cat?.emoji||'📂'}</span> ${cat?.title||t.categoryId}</td>

  } catch(e) { tbody.innerHTML=`<tr><td colspan="6" class="loading">Xatolik: ${e.message}</td></tr>`; }
}

async function addTopic() {
  const catId = document.getElementById('t-cat').value;

async function setTopicStatus(id, status) {

let allTopics = [];

      <input type="hidden" id="q-edit-id"/>
      <div class="form-grid">
        <div class="form-group"><label>Kategoriya *</label>
          <select class="inp" id="q-cat" onchange="updateTopicSelect()">${catOptions}</select>
        </div>
        <div class="form-group"><label>Mavzu *</label>

        </div>
      </div>
      <div class="form-group"><label>Savol matni *</label>

      <div class="form-group"><label>A javob *</label><input class="inp" id="q-a" placeholder="A javob"/></div>
      <div class="form-group"><label>B javob *</label><input class="inp" id="q-b" placeholder="B javob"/></div>
      <div class="form-group"><label>C javob *</label><input class="inp" id="q-c" placeholder="C javob"/></div>
      <div class="form-grid">
        <div class="form-group"><label>To'g'ri javob *</label>

          </select>

          ${catOptions}
        </select>

          <option value="">Barcha mavzular</option>
        </select>
        <select id="qf-status" onchange="loadQuestionList()">
          <option value="">Barcha holat</option>
          <option value="published">Nashr</option>
          <option value="draft">Qoralama</option>

        </select>

        <thead><tr><th>#</th><th>Kategoriya</th><th>Mavzu</th><th>Savol</th><th>Qiyinlik</th><th>Holat</th><th>Amallar</th></tr></thead>

function updateTopicSelect() {
  const catId = document.getElementById('q-cat')?.value;
  const sel = document.getElementById('q-topic');
  if (!sel) return;
  sel.innerHTML = '<option value="">Mavzu tanlang...</option>';
  allTopics.filter(t=>t.categoryId===catId||t.categorySlug===catId).forEach(t=>{
    sel.innerHTML += `<option value="${t.id}">${t.title}</option>`;
  });
}

async function loadQuestionList() {
  const tbody = document.getElementById('q-tbody');
  const filterCat = document.getElementById('qf-cat')?.value||'';
  const filterTopic = document.getElementById('qf-topic')?.value||'';
  const filterStatus = document.getElementById('qf-status')?.value||'';
  try {
    const snap = await db.collection('questions').orderBy('createdAt','desc').get();
    let docs = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (filterCat) docs = docs.filter(d=>d.categoryId===filterCat||d.categorySlug===filterCat);
    if (filterTopic) docs = docs.filter(d=>d.topicId===filterTopic);
    if (filterStatus) docs = docs.filter(d=>d.status===filterStatus);
    document.getElementById('q-count').textContent = docs.length+' ta savol';
    if (!docs.length) { tbody.innerHTML='<tr><td colspan="7" class="empty">Savol yo\'q</td></tr>'; return; }
    const DIFF = {easy:'Oson',medium:"O'rta",hard:'Qiyin'};
    tbody.innerHTML = docs.map((q,i)=>{
      const cat = allCategories.find(c=>c.id===q.categoryId||c.slug===q.categorySlug);
      const topic = allTopics.find(t=>t.id===q.topicId);
      return `<tr>
        <td style="color:var(--text2)">${i+1}</td>
        <td>${cat?.emoji||''} ${cat?.title||q.categoryId||'—'}</td>
        <td style="font-size:12px;color:var(--text2)">${topic?.title||'—'}</td>
        <td class="q-text-cell" title="${q.question||''}">${q.question||'—'}</td>
        <td><span class="badge badge-${q.difficulty||'easy'}">${DIFF[q.difficulty]||q.difficulty}</span></td>
        <td><span class="badge badge-${q.status||'draft'}">${q.status==='published'?'Nashr':q.status==='archived'?'Arxiv':'Qoralama'}</span></td>
        <td><div class="actions-col">
          <button class="btn-sm btn-edit" onclick="editQuestion('${q.id}')">✏️</button>
          <button class="btn-sm btn-pub" onclick="setQStatus('${q.id}','${q.status==='published'?'draft':'published'}')">${q.status==='published'?'Draft':'Nashr'}</button>
          <button class="btn-sm btn-del" onclick="deleteQuestion('${q.id}')">🗑️</button>
        </div></td>
      </tr>`;
    }).join('');
  } catch(e) { tbody.innerHTML=`<tr><td colspan="7" class="loading">Xatolik: ${e.message}</td></tr>`; }
}

function resetQForm() {
  editingQId = null;
  document.getElementById('q-form-title').textContent = '➕ Yangi savol';
  document.getElementById('q-edit-id').value = '';
  ['q-question','q-a','q-b','q-c','q-exp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('q-correct').value='0';
  document.getElementById('q-diff').value='easy';
  document.getElementById('q-status').value='draft';
  document.getElementById('q-msg').style.display='none';
}

async function saveQuestion() {
  const catId = document.getElementById('q-cat').value;
  const topicId = document.getElementById('q-topic').value;
  const question = document.getElementById('q-question').value.trim();
  const a = document.getElementById('q-a').value.trim();
  const b = document.getElementById('q-b').value.trim();
  const c = document.getElementById('q-c').value.trim();
  const correctIndex = parseInt(document.getElementById('q-correct').value);
  const explanation = document.getElementById('q-exp').value.trim();
  const difficulty = document.getElementById('q-diff').value;
  const status = document.getElementById('q-status').value;

  if (!catId) { showMsg('q-msg','Kategoriya tanlang',false); return; }
  if (!topicId) { showMsg('q-msg','Mavzu tanlang',false); return; }
  if (!question) { showMsg('q-msg','Savol matni bo\'sh bo\'lmasin',false); return; }
  if (!a||!b||!c) { showMsg('q-msg','Barcha 3 ta javob variantini to\'ldiring',false); return; }
  if (![0,1,2].includes(correctIndex)) { showMsg('q-msg','To\'g\'ri javobni tanlang',false); return; }
  if (!explanation) { showMsg('q-msg','Izoh bo\'sh bo\'lmasin',false); return; }

  const cat = allCategories.find(c=>c.id===catId);
  const topic = allTopics.find(t=>t.id===topicId);

  const data = {
    categoryId: catId,
    categorySlug: cat?.slug||catId,
    topicId: topicId,
    topicSlug: topic?.slug||topicId,
    question, options:[a,b,c], correctIndex,
    explanation, difficulty, status,
    updatedAt: TS()
  };

  try {
    const id = editingQId || document.getElementById('q-edit-id').value;
    if (id) {
      await db.collection('questions').doc(id).update(data);
      showMsg('q-msg','✅ Yangilandi!');
      editingQId = null;
    } else {
      data.createdAt = TS();
      await db.collection('questions').add(data);
      showMsg('q-msg','✅ Savollar qo\'shildi!');
      resetQForm();
    }
    loadQuestionList();
  } catch(e) { showMsg('q-msg','❌ '+e.message,false); }
}

async function editQuestion(id) {
  const doc = await db.collection('questions').doc(id).get();
  if (!doc.exists) return;
  const q = doc.data();
  editingQId = id;
  document.getElementById('q-form-title').textContent = '✏️ Savolni tahrirlash';
  document.getElementById('q-edit-id').value = id;
  document.getElementById('q-cat').value = q.categoryId||'';
  updateTopicSelect();
  setTimeout(()=>{ document.getElementById('q-topic').value = q.topicId||''; }, 100);
  document.getElementById('q-question').value = q.question||'';
  document.getElementById('q-a').value = q.options?.[0]||'';
  document.getElementById('q-b').value = q.options?.[1]||'';
  document.getElementById('q-c').value = q.options?.[2]||'';
  document.getElementById('q-correct').value = String(q.correctIndex||0);
  document.getElementById('q-exp').value = q.explanation||'';
  document.getElementById('q-diff').value = q.difficulty||'easy';
  document.getElementById('q-status').value = q.status||'draft';
  window.scrollTo(0,0);
}

async function setQStatus(id, status) {
  await db.collection('questions').doc(id).update({status, updatedAt:TS()});
  loadQuestionList();
}

async function deleteQuestion(id) {
  if (!confirm("Savolni o'chirishni tasdiqlaysizmi?")) return;
  await db.collection('questions').doc(id).delete();
  loadQuestionList();
}
